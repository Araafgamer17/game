<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 3D CYBER BLAST ONLINE 🌐</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: monospace; color: #fff; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #0f0; }
        input, button { padding: 8px; margin: 4px 0; border-radius: 4px; border: none; font-family: monospace; font-weight: bold;}
        button { background: #0f0; color: #000; cursor: pointer; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-size: 24px; pointer-events: none; z-index: 5; display: none;}
        #msg { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 20px; color: #ff0055; text-shadow: 0 0 10px #ff0055; }
    </style>
</head>
<body>

    <div id="crosshair">+</div>
    <div id="msg"></div>

    <div id="ui">
        <h3>⚡ 3D Cyber Blast</h3>
        <p>Your ID: <b id="my-id" style="color:#0f0;">Connecting...</b></p>
        <input type="text" id="peer-id" placeholder="Friend's ID"><br>
        <button onclick="connectToFriend()">Connect & Play</button>
        <p style="font-size:11px; color:#aaa;">Move: WASD | Shoot: SPACEBAR</p>
    </div>

    <script>
        let peer, conn, role = "";
        let scene, camera, renderer;
        let me = { x: 0, z: 0, rotY: 0, laser: null };
        let opponent = { mesh: null, laser: null };
        const keys = {};

        // --- 1. SET UP 3D GRAPHICS ENGINE (Three.js) ---
        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Neon Grid Floor
            const grid = new THREE.GridHelper(100, 50, 0x00ff00, 0x222222);
            grid.position.y = -1;
            scene.add(grid);

            // Lighting
            const light = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(light);

            // Build Opponent Mesh (Neon Pink Cube)
            const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const mat = new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true });
            opponent.mesh = new THREE.Mesh(geo, mat);
            scene.add(opponent.mesh);

            // Setup Laser Graphics
            const laserGeo = new THREE.BoxGeometry(0.2, 0.2, 5);
            me.laser = new THREE.Mesh(laserGeo, new THREE.MeshBasicMaterial({ color: 0x00ffff }));
            opponent.laser = new THREE.Mesh(laserGeo, new THREE.MeshBasicMaterial({ color: 0xff0055 }));
            scene.add(me.laser); scene.add(opponent.laser);
            me.laser.visible = opponent.laser.visible = false;

            // Start Positions depending on network role
            me.z = role === "host" ? 15 : -15;
            me.rotY = role === "host" ? 0 : Math.PI;

            window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            document.getElementById("ui").style.display = "none";
            document.getElementById("crosshair").style.display = "block";

            animate3D();
        }

        // --- 2. MULTIPLAYER NETWORKING (PeerJS) ---
        peer = new Peer();
        peer.on('open', id => document.getElementById("my-id").innerText = id);
        
        // Host Receiver
        peer.on('connection', c => {
            conn = c; role = "host";
            conn.on('open', init3D);
            setupNetwork();
        });

        // Guest Connector
        function connectToFriend() {
            const id = document.getElementById("peer-id").value;
            conn = peer.connect(id); role = "guest";
            conn.on('open', init3D);
            setupNetwork();
        }

        function setupNetwork() {
            conn.on('data', data => {
                // Update opponent coordinates from network pack
                opponent.mesh.position.set(data.x, 0, data.z);
                opponent.mesh.rotation.y = data.rot;
                
                if (data.shooting) {
                    opponent.laser.position.set(data.lx, 0, data.lz);
                    opponent.laser.rotation.y = data.rot;
                    opponent.laser.visible = true;
                } else {
                    opponent.laser.visible = false;
                }

                if (data.hitMe) {
                    document.getElementById("msg").innerText = "YOU GOT BLASTED!";
                    setTimeout(() => document.getElementById("msg").innerText = "", 2000);
                }
            });
        }

        // --- 3. GAME LOOP, CONTROLS & PHYSICS ---
        let isShooting = false;
        let hitDetected = false;

        function animate3D() {
            requestAnimationFrame(animate3D);

            // Handle Camera Rotation & Movement
            if (keys['a']) me.rotY += 0.04;
            if (keys['d']) me.rotY -= 0.04;
            
            let speed = 0.2;
            if (keys['w']) {
                me.x -= Math.sin(me.rotY) * speed;
                me.z -= Math.cos(me.rotY) * speed;
            }
            if (keys['s']) {
                me.x += Math.sin(me.rotY) * speed;
                me.z += Math.cos(me.rotY) * speed;
            }

            // Bind Camera right behind your character viewpoint (First Person style)
            camera.position.set(me.x, 0.5, me.z);
            camera.rotation.y = me.rotY;

            // Handle Shooting Input
            if (keys[' '] && !isShooting) {
                isShooting = true;
                me.laser.position.set(me.x, 0, me.z);
                me.laser.rotation.y = me.rotY;
                me.laser.visible = true;

                // Simple 3D Bullet Raycast collision math
                // Check if opponent cube is in front of our pointing camera view angle
                let dist = camera.position.distanceTo(opponent.mesh.position);
                let targetX = me.x - Math.sin(me.rotY) * dist;
                let targetZ = me.z - Math.cos(me.rotY) * dist;
                
                if (Math.abs(targetX - opponent.mesh.position.x) < 1.5 && Math.abs(targetZ - opponent.mesh.position.z) < 1.5) {
                    hitDetected = true;
                    document.getElementById("msg").innerText = "TARGET HIT!";
                    setTimeout(() => document.getElementById("msg").innerText = "", 1500);
                }

                setTimeout(() => { isShooting = false; me.laser.visible = false; hitDetected = false; }, 200);
            }

            // Animate local laser forward if fired
            if (isShooting) {
                me.laser.position.x -= Math.sin(me.rotY) * 1.5;
                me.laser.position.z -= Math.cos(me.rotY) * 1.5;
            }

            // Outbound Data Transmission Pack (Keeps packets small/lightweight)
            conn.send({
                x: me.x, z: me.z, rot: me.rotY,
                shooting: isShooting, lx: me.laser.position.x, lz: me.laser.position.z,
                hitMe: hitDetected
            });

            renderer.render(scene, camera);
        }

        // Handle Resizing window flawlessly
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
