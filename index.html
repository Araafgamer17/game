<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 CYBER DUEL ONLINE 🌐</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #lobby {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        input, button {
            padding: 10px;
            font-size: 1rem;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #00ffcc;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        #game-container { display: none; text-align: center; }
        canvas {
            border: 4px solid #ff007f;
            background: #05070f;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.2);
        }
    </style>
</head>
<body>

    <div id="lobby">
        <h2>🌐 Cyber Duel Online</h2>
        <p>Your ID: <b id="my-id" style="color:#00ffcc;">Connecting...</b></p>
        <hr style="border-color: #334155;">
        <p>Connect to a Friend:</p>
        <input type="text" id="peer-id-input" placeholder="Enter Friend's ID">
        <button onclick="connectToPeer()">Connect & Play</button>
        <p id="status" style="color: #94a3b8;">Initializing network...</p>
    </div>

    <div id="game-container">
        <h3 id="role-display">Playing...</h3>
        <canvas id="gameCanvas" width="700" height="400"></canvas>
        <p style="color: #64748b;">Controls: W (Up) | S (Down) | A (Left) | D (Right)</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let peer;
        let conn;
        let role = ""; // "host" or "guest"
        
        // Game States
        let p1 = { x: 100, y: 180, size: 30, color: "#00ffcc" }; // Host
        let p2 = { x: 570, y: 180, size: 30, color: "#ff007f" }; // Guest
        const keys = {};

        // 1. Initialize PeerJS Connection
        peer = new Peer();

        peer.on('open', (id) => {
            document.getElementById("my-id").innerText = id;
            document.getElementById("status").innerText = "Ready! Share your ID or enter a friend's.";
        });

        // 2. LISTEN FOR INCOMING CONNECTIONS (If you are the Host)
        peer.on('connection', (connection) => {
            conn = connection;
            role = "host";
            setupConnection();
        });

        // 3. INITIATE CONNECTION (If you are the Guest)
        function connectToPeer() {
            const peerId = document.getElementById("peer-id-input").value;
            if (!peerId) return alert("Please enter a valid ID!");
            
            document.getElementById("status").innerText = "Connecting...";
            conn = peer.connect(peerId);
            role = "guest";
            setupConnection();
        }

        // 4. Handle Active Peer Connection
        function setupConnection() {
            conn.on('open', () => {
                document.getElementById("lobby").style.display = "none";
                document.getElementById("game-container").style.display = "block";
                document.getElementById("role-display").innerText = role === "host" ? "🔵 HOST (Control Green Box)" : "🔴 GUEST (Control Pink Box)";
                
                // Start listening to keystrokes
                window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
                window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
                
                gameLoop();
            });

            // Receive real-time movement updates from your opponent
            conn.on('data', (data) => {
                if (role === "host") {
                    // Host receives guest position
                    p2.x = data.x;
                    p2.y = data.y;
                } else {
                    // Guest receives host position
                    p1.x = data.x;
                    p1.y = data.y;
                }
            });
        }

        // 5. Game Loop & Networking Engine
        function gameLoop() {
            // Handle Local Player Movement
            let speed = 5;
            if (role === "host") {
                if (keys['w'] && p1.y > 0) p1.y -= speed;
                if (keys['s'] && p1.y < canvas.height - p1.size) p1.y += speed;
                if (keys['a'] && p1.x > 0) p1.x -= speed;
                if (keys['d'] && p1.x < canvas.width/2 - p1.size) p1.x += speed; // Locked to left half
                
                // Send data to Guest
                conn.send({ x: p1.x, y: p1.y });
            } else {
                if (keys['w'] && p2.y > 0) p2.y -= speed;
                if (keys['s'] && p2.y < canvas.height - p2.size) p2.y += speed;
                if (keys['a'] && p2.x > canvas.width/2) p2.x -= speed; // Locked to right half
                if (keys['d'] && p2.x < canvas.width - p2.size) p2.x += speed;
                
                // Send data to Host
                conn.send({ x: p2.x, y: p2.y });
            }

            // Render Arena
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Center Net Divider
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(350, 0); ctx.lineTo(350, 400); ctx.stroke();

            // Draw Player 1 (Host)
            ctx.shadowBlur = 10; ctx.shadowColor = p1.color;
            ctx.fillStyle = p1.color;
            ctx.fillRect(p1.x, p1.y, p1.size, p1.size);

            // Draw Player 2 (Guest)
            ctx.shadowColor = p2.color;
            ctx.fillStyle = p2.color;
            ctx.fillRect(p2.x, p2.y, p2.size, p2.size);
            ctx.shadowBlur = 0;

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
